<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: head(title='Gestión de Canchas')}"></head>

<body>
	
	<div th:replace="~{fragments/boton-volver :: back(url=@{/torneos})}"></div>
	
    <div class="container">
        <div class="main-card" style="max-width: 1100px;">
            
            <div class="bg-primary-header d-flex justify-content-between align-items-center p-3">
                <h1 class="h4 mb-0 text-white"><i class="bi bi-pin-map-fill me-2"></i> Gestión de Canchas</h1>
                <a th:href="@{/canchas/nuevo}" class="btn btn-light fw-bold text-dark">
                    <i class="bi bi-plus-circle-fill"></i> Nueva Cancha
                </a>
            </div>

            <div th:if="${mensajeExito}" class="alert alert-success m-3" role="alert"
                 th:text="${mensajeExito}"></div>
                 
            <div th:if="${mensajeError}" class="alert alert-danger m-3" role="alert"
                 th:text="${mensajeError}"></div>

            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle mb-0">
                    <thead class="table-primary">
                        <tr>
                            <th>Nombre</th>
                            <th>Ubicación</th>
                            <th>Capacidad</th>
                            <th class="text-end">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${canchas.isEmpty()}">
                            <td colspan="4" class="text-center p-4">No hay canchas registradas.</td>
                        </tr>
                        <tr th:each="cancha : ${canchas}">
                            <td th:text="${cancha.nombre}">Estadio Principal</td>
                            <td th:text="${cancha.ubicacion}">Calle 123</td>
                            <td th:text="${cancha.capacidad}">10000</td>
                            <td class="text-end">
                                <a th:href="@{/canchas/editar/{id}(id=${cancha.id})}" class="btn btn-warning btn-sm text-dark fw-bold">
                                    <i class="bi bi-pencil-fill"></i> Editar
                                </a>
                                <button type="button" class="btn btn-danger btn-sm ms-2 fw-bold"
                                        data-bs-toggle="modal" 
                                        th:data-bs-target="'#modalDeleteCancha-' + ${cancha.id}">
                                    <i class="bi bi-trash-fill"></i> Eliminar
                                </button>
                                
                                <div th:replace="~{fragments/modal-eliminar :: modal(
                                    modalId='modalDeleteCancha-' + ${cancha.id},
                                    modalTitle='Confirmar Eliminación',
                                    modalBody='¿Seguro que deseas eliminar la cancha: <strong>' + ${cancha.nombre} + '</strong>?',
                                    modalConfirmUrl=@{/canchas/eliminar/{id}(id=${cancha.id})}
                                )}"></div>
                                
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        
    </div>

    <th:block th:replace="~{fragments/header :: scripts}"></th:block>
</body>
</html>
