<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">

<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' - SGTF'">SGTF</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">
    
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <script th:fragment="scripts" 
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" 
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" 
            crossorigin="anonymous">
    </script>
    
    <th:block th:fragment="datepicker-scripts">
        <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
        <script src="https://npmcdn.com/flatpickr/dist/l10n/es.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/plugins/confirmDate/confirmDate.js"></script>
        
        <script>
            document.addEventListener('DOMContentLoaded', function() {
                // Configuración para solo Fecha (ej. 2025-10-30)
                flatpickr(".datepicker", {
                    "locale": "es", // Español
                    "altInput": true,
                    "altFormat": "d/m/Y", // Formato que ve el usuario
                    "dateFormat": "Y-m-d", // Formato que se envía a Spring
                    "plugins": [new confirmDatePlugin({
                        confirmText: "OK", // Texto del botón
                        showAlways: true
                    })]
                });
                
                // Configuración para Fecha y Hora (ej. 2025-10-30T14:30)
                flatpickr(".datetimepicker", {
                    "locale": "es",
                    "enableTime": true,
                    "altInput": true,
                    "altFormat": "d/m/Y H:i",
                    "dateFormat": "Y-m-d\\TH:i", // Formato que Spring entiende
                    "plugins": [new confirmDatePlugin({
                        confirmText: "OK",
                        showAlways: true
                    })]
                });
            });
        </script>
    </th:block>
</body>
</html>
