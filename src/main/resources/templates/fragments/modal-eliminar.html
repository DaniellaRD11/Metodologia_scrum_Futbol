<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="modal(modalId, modalTitle, modalBody, modalConfirmUrl)"
     class="modal fade modal-confirm-delete" th:id="${modalId}" 
     tabindex="-1" th:aria-labelledby="${modalId} + 'Label'" aria-hidden="true">
     
    <div class="modal-dialog modal-sm modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" th:id="${modalId} + 'Label'">
                    <i class="bi bi-exclamation-triangle-fill"></i>
                    <span th:text="${modalTitle}">Confirmar</span>
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <p th:utext="${modalBody}">¿Estás seguro?</p>
                <small class="text-muted">Esta acción no se puede deshacer.</small>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <a th:href="${modalConfirmUrl}" class="btn btn-danger">Eliminar</a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
