<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="'Jugadores de ' + ${equipo.nombre}">Gestión de Jugadores</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container mt-5 mb-5">

        <!-- Título principal -->
        <div class="d-flex align-items-center mb-4">
            <i class="bi bi-person-lines-fill text-success fs-2 me-2"></i>
            <h1 class="m-0" th:text="'Gestión de Jugadores para: ' + ${equipo.nombre}">Gestión de Jugadores</h1>
        </div>
        <hr>

        <!-- Formulario nuevo jugador -->
        <div class="card shadow-sm mb-4">
            <div class="card-header bg-success text-white">
                <h5 class="mb-0"><i class="bi bi-person-plus-fill me-2"></i> Añadir Nuevo Jugador</h5>
            </div>
            <div class="card-body">
                <form th:action="@{/equipos/{idEquipo}/jugadores/guardar(idEquipo=${idEquipo})}" 
                      th:object="${nuevoJugador}" 
                      method="post"
                      class="row g-3">

                    <div class="col-md-4">
                        <label for="nombre" class="form-label">Nombre:</label>
                        <input type="text" id="nombre" th:field="*{nombre}" class="form-control" required>
                    </div>

                    <div class="col-md-4">
                        <label for="posicion" class="form-label">Posición:</label>
                        <input type="text" id="posicion" th:field="*{posicion}" class="form-control">
                    </div>

                    <div class="col-md-4">
                        <label for="fechaNacimiento" class="form-label">Fecha de Nacimiento:</label>
                        <input type="date" id="fechaNacimiento" th:field="*{fechaNacimiento}" class="form-control">
                    </div>

                    <div class="col-12 text-end">
                        <button type="submit" class="btn btn-success">
                            <i class="bi bi-check-circle-fill me-1"></i> Guardar Jugador
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Tabla de jugadores -->
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0"><i class="bi bi-people-fill me-2"></i> Plantilla del Equipo</h5>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover table-striped align-middle mb-0">
                        <thead class="table-primary">
                            <tr>
                                <th>Nombre</th>
                                <th>Posición</th>
                                <th>Fecha Nacimiento</th>
                                <th class="text-end">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${jugadores.isEmpty()}">
                                <td colspan="4" class="text-center py-3">Este equipo aún no tiene jugadores registrados.</td>
                            </tr>

                            <tr th:each="jugador : ${jugadores}">
                                <td th:text="${jugador.nombre}">Nombre del Jugador</td>
                                <td th:text="${jugador.posicion}">Posición</td>
                                <td th:text="${#temporals.format(jugador.fechaNacimiento, 'dd/MM/yyyy')}">01/01/2000</td>
                                <td class="text-end">
                                    <a th:href="@{/equipos/{idEquipo}/jugadores/eliminar/{idJugador}(idEquipo=${idEquipo}, idJugador=${jugador.id})}"
                                       class="btn btn-outline-danger btn-sm"
                                       onclick="return confirm('¿Desea eliminar a ' + this.closest('tr').children[0].textContent + '?');">
                                        <i class="bi bi-trash-fill"></i> Eliminar
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Botón volver -->
        <div class="mt-4">
            <a th:href="@{/torneos}" class="btn btn-secondary">
                <i class="bi bi-arrow-left"></i> Volver a Torneos
            </a>
        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
