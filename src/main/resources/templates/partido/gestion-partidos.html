<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: head(title='Partidos: ' + ${torneo.nombre})}"></head>

<body>
    <div th:replace="~{fragments/boton-volver :: back(url=@{/torneos/{id}(id=${torneo.id})})}"></div>

    <div class="container">
        <div class="main-card" style="max-width: 1200px;">
        
            <div class="bg-success-header d-flex justify-content-between align-items-center p-3">
                <h1 class="h4 mb-0 text-white"><i class="bi bi-clock-fill me-2"></i> Gestionar Partidos de: <span th:text="${torneo.nombre}"></span></h1>
            </div>
            
            <div th:if="${mensaje}" class="alert alert-success m-3" role="alert" th:text="${mensaje}"></div>

            <form th:action="@{/partidos/torneo/{idTorneo}/guardar(idTorneo=${torneo.id})}" 
                  th:object="${nuevoPartido}" 
                  method="post"
                  class="row g-3 p-4 needs-validation" novalidate>
                
                <h2 class="h5 text-white">Programar Nuevo Partido</h2>

                <div class="col-md-3">
                    <label for="fecha" class="form-label fw-bold text-dark">Fecha y Hora:</label>
                    <input type="text" id="fecha" class="form-control datetimepicker" th:field="*{fecha}" required placeholder="Seleccionar fecha y hora..." />
                </div>

                <div class="col-md-3">
                    <label for="local" class="form-label fw-bold text-dark">Equipo Local:</label>
                    <select id="local" th:field="*{idEquipoLocal}" class="form-select" required>
                        <option value="">-- Seleccionar Local --</option>
                        <option th:each="equipo : ${equiposInscritos}" th:value="${equipo.id}" th:text="${equipo.nombre}"></option>
                    </select>
                </div>
                
                <div class="col-md-3">
                    <label for="visitante" class="form-label fw-bold text-dark">Equipo Visitante:</label>
                    <select id="visitante" th:field="*{idEquipoVisitante}" class="form-select" required>
                        <option value="">-- Seleccionar Visitante --</option>
                        <option th:each="equipo : ${equiposInscritos}" th:value="${equipo.id}" th:text="${equipo.nombre}"></option>
                    </select>
                </div>
                
                <div class="col-md-3">
                    <label for="cancha" class="form-label fw-bold text-dark">Cancha:</label>
                    <select id="cancha" th:field="*{idCancha}" class="form-select" required>
                        <option value="">-- Seleccionar Cancha --</option>
                        <option th:each="cancha : ${canchasDisponibles}" th:value="${cancha.id}" th:text="${cancha.nombre}"></option>
                    </select>
                </div>
                
                <div class="col-12 text-end">
                    <button type="submit" class="btn btn-success fw-bold">
                        <i class="bi bi-calendar-check"></i> Programar Partido
                    </button>
                </div>
            </form>

            <hr class="mt-4 mb-4">

            <h2 class="h4 mb-3 text-white px-4">Partidos Programados</h2>
            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle mb-0">
                    <thead class="table-success">
                        <tr>
                            <th>Fecha</th>
                            <th>Local</th>
                            <th>Visitante</th>
                            <th>Cancha</th>
                            <th>Resultado</th>
                            <th class="text-end">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${partidosDelTorneo.isEmpty()}">
                            <td colspan="6" class="text-center p-4">Aún no hay partidos programados.</td>
                        </tr>
                        <tr th:each="partido : ${partidosDelTorneo}">
                            <td th:text="${#temporals.format(partido.fecha, 'dd-MM-yyyy HH:mm')}"></td>
                            <td th:text="${partido.equipoLocalNombre}"></td>
                            <td th:text="${partido.equipoVisitanteNombre}"></td>
                            <td th:text="${partido.canchaNombre}"></td>
                            
                            <td>
                                <span th:if="${partido.resultado == 'P.J.'}" class="badge bg-warning text-dark">
                                    POR JUGAR
                                </span>
                                <strong th:unless="${partido.resultado == 'P.J.'}" th:text="${partido.resultado}"></strong>
                            </td>
                            
                            <td class="text-end">
                                <button th:if="${partido.resultado == 'P.J.'}"
                                        type="button" 
                                        class="btn btn-info btn-sm me-2 text-dark fw-bold"
                                        data-bs-toggle="modal"
                                        data-bs-target="#resultadoModal"
                                        th:data-partido-id="${partido.id}"
                                        th:data-local-name="${partido.equipoLocalNombre}"
                                        th:data-visitante-name="${partido.equipoVisitanteNombre}">
                                    <i class="bi bi-bullseye"></i> Resultado
                                </button>
                                
                                <a th:href="@{/partidos/{idPartido}/tarjetas(idPartido=${partido.id})}"
                                   class="btn btn-warning btn-sm me-2 text-dark fw-bold">
                                    <i class="bi bi-person-vcard"></i> Tarjetas
                                </a>
                                
                                <button type="button" class="btn btn-danger btn-sm"
                                        data-bs-toggle="modal" 
                                        th:data-bs-target="'#modalDeletePartido-' + ${partido.id}">
                                    <i class="bi bi-trash-fill"></i>
                                </button>
                                
                                <div th:replace="~{fragments/modal-eliminar :: modal(
                                    modalId='modalDeletePartido-' + ${partido.id},
                                    modalTitle='Confirmar Eliminación',
                                    modalBody='¿Seguro que deseas eliminar el partido entre <strong>' + ${partido.equipoLocalNombre} + ' vs ' + ${partido.equipoVisitanteNombre} + '</strong>?',
                                    modalConfirmUrl=@{/partidos/torneo/{idTorneo}/eliminar/{idPartido}(idTorneo=${torneo.id}, idPartido=${partido.id})}
                                )}"></div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal fade" id="resultadoModal" tabindex="-1" aria-labelledby="resultadoModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-md modal-dialog-centered">
            <div class="modal-content bg-light text-dark">
                <div class="modal-header bg-info text-dark">
                    <h5 class="modal-title" id="resultadoModalLabel">Registrar Goles</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form id="resultadoForm" method="post" 
                      th:action="@{/partidos/torneo/{idTorneo}/registrar-resultado(idTorneo=${torneo.id})}">
                    <div class="modal-body row g-3">
                        <input type="hidden" name="idPartido" id="modal-idPartido">
                        
                        <div class="col-6 text-center border-end">
                            <label id="modal-localName" class="form-label fs-5 text-dark fw-bold">LOCAL</label>
                            <input type="number" name="golesLocal" class="form-control form-control-lg text-center" min="0" value="0" required>
                        </div>
                        
                        <div class="col-6 text-center">
                            <label id="modal-visitanteName" class="form-label fs-5 text-dark fw-bold">VISITANTE</label>
                            <input type="number" name="golesVisitante" class="form-control form-control-lg text-center" min="0" value="0" required>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-info">Guardar Resultado</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <th:block th:replace="~{fragments/header :: scripts}"></th:block>
    <th:block th:replace="~{fragments/header :: datepicker-scripts}"></th:block>
    
    <script th:inline="javascript">
        document.addEventListener('DOMContentLoaded', function () {
            var resultadoModal = document.getElementById('resultadoModal');
            if (resultadoModal) {
                resultadoModal.addEventListener('show.bs.modal', function (e) {
                    var button = e.relatedTarget;
                    var partidoId = button.getAttribute('data-partido-id');
                    var localName = button.getAttribute('data-local-name');
                    var visitanteName = button.getAttribute('data-visitante-name');
                    
                    document.getElementById('modal-idPartido').value = partidoId;
                    document.getElementById('modal-localName').textContent = localName;
                    document.getElementById('modal-visitanteName').textContent = visitanteName;
                });
            }
        });
    </SCript>
</body>
</html>
