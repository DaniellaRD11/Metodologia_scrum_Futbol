<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: head(title='Registro de Tarjetas')}"></head>

<body>
    <div class="main-card" style="max-width: 1000px;">

        <div class="bg-warning text-dark d-flex justify-content-between align-items-center p-3" style="border-radius: 1rem 1rem 0 0;">
            <h1 class="h4 mb-0"><i class="bi bi-person-vcard me-2"></i> Registrar Tarjetas</h1>
        </div>
        
        <div class="p-4 text-center">
            <h2 class="h3" th:text="${partido.equipoLocalNombre} + ' vs ' + ${partido.equipoVisitanteNombre}"></h2>
            <h5 class="text-muted" th:text="${partido.torneoNombre}"></h5>
        </div>
        
        <div th:if="${mensajeExito}" class="alert alert-success mx-4" role="alert" th:text="${mensajeExito}"></div>
        <div th:if="${mensajeError}" class="alert alert-danger mx-4" role="alert" th:text="${mensajeError}"></div>

        <form th:action="@{/partidos/{idPartido}/tarjetas/registrar(idPartido=${partido.id})}"
              th:object="${nuevaTarjeta}" method="post"
              class="row g-3 p-4 border-bottom border-secondary needs-validation" novalidate>
            
            <div class="col-md-5">
                <label for="jugador" class="form-label fw-bold">1. Seleccione el Jugador:</label>
                <select id="jugador" class="form-select" th:field="*{idJugador}" required>
                    <option value="">-- Seleccionar Jugador --</option>
                    
                    <optgroup th:label="${partido.equipoLocalNombre}">
                        <option th:each="jL : ${jugadoresLocal}" 
                                th:value="${jL.id}" 
                                th:text="${jL.nombre} + ' (' + ${jL.posicion} + ')'"></option>
                    </optgroup>
                    
                    <optgroup th:label="${partido.equipoVisitanteNombre}">
                        <option th:each="jV : ${jugadoresVisitante}" 
                                th:value="${jV.id}" 
                                th:text="${jV.nombre} + ' (' + ${jV.posicion} + ')'"></option>
                    </optgroup>
                </select>
            </div>
            
            <div class="col-md-3">
                <label for="tipoTarjeta" class="form-label fw-bold">2. Seleccione Tarjeta:</label>
                <select id="tipoTarjeta" class="form-select" th:field="*{tipoTarjeta}" required>
                    <option value="">-- Tipo --</option>
                    <option value="AMARILLA">Amarilla</option>
                    <option value="ROJA">Roja</option>
                </select>
            </div>
            
            <div class="col-md-2">
                <label for="minuto" class="form-label fw-bold">3. Minuto:</label>
                <input type="number" id="minuto" class="form-control" th:field="*{minutoJuego}" placeholder="Ej. 43" min="0" max="120" />
            </div>
            
            <div class="col-md-2 d-flex align-items-end">
                <button type="submit" class="btn btn-warning text-dark w-100 fw-bold">Registrar</button>
            </div>
        </form>

        <div class="p-4">
            <h3 class="h5 text-white">Tarjetas Registradas en este Partido</h3>
            <div class="table-responsive">
                <table class="table table-sm table-striped table-hover align-middle mb-0">
                    <thead>
                        <tr>
                            <th>Jugador</th>
                            <th>Tipo</th>
                            <th>Minuto</th>
                            <th class="text-end">Quitar</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${tarjetasRegistradas.isEmpty()}">
                            <td colspan="4" class="text-center p-3">Sin incidentes.</td>
                        </tr>
                        <tr th:each="tarjeta : ${tarjetasRegistradas}">
                            <td th:text="${tarjeta.nombreJugador}"></td>
                            <td>
                                <span th:if="${tarjeta.tipoTarjeta == 'AMARILLA'}" class="badge bg-warning text-dark">Amarilla</span>
                                <span th:if="${tarjeta.tipoTarjeta == 'ROJA'}" class="badge bg-danger">Roja</span>
                            </td>
                            <td th:text="${tarjeta.minutoJuego} + ' min'"></td>
                            <td class="text-end">
                                <a th:href="@{/partidos/tarjetas/eliminar/{idTarjeta}(idTarjeta=${tarjeta.id})}" 
                                   class="btn btn-outline-danger btn-sm"
                                   onclick="return confirm('¿Quitar este registro de tarjeta?');">
                                    <i class="bi bi-x-circle"></i>
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>
    
    <div class="text-center">
        <a th:href="@{/partidos/torneo/{id}(id=${partido.idTorneo})}" class="btn btn-outline-light btn-volver">
             <i class="bi bi-arrow-left-circle"></i> Volver a la Lista de Partidos
        </a>
    </div>

    <th:block th:replace="~{fragments/header :: scripts}"></th:block>
</body>
</html>
