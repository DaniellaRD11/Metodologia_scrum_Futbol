<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
	

<head th:replace="~{fragments/header :: head(title='Gestión de Torneos')}"></head>

<body>
    <div th:replace="~{fragments/boton-volver :: back(url=@{/})}"></div>
    
    <div class="container">
        <div class="main-card" style="max-width: 1200px;">
            
            <div class="bg-success-header d-flex justify-content-between align-items-center p-3">
                <h1 class="h4 mb-0 text-white"><i class="bi bi-trophy-fill me-2"></i> Gestión de Torneos</h1>
                <div>
                    <a th:href="@{/canchas}" class="btn btn-light fw-bold text-dark me-2">
                        <i class="bi bi-pin-map-fill"></i> Canchas
                    </a>
                    <a th:href="@{/torneos/nuevo}" class="btn btn-light fw-bold text-dark">
                        <i class="bi bi-plus-circle-fill"></i> Nuevo Torneo
                    </a>
                </div>
            </div>
            
            <div th:if="${mensajeExito}" class="alert alert-success m-3" role="alert" th:text="${mensajeExito}"></div>
            <div th:if="${mensajeError}" class="alert alert-danger m-3" role="alert" th:text="${mensajeError}"></div>

            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle mb-0">
                    <thead class="table-success">
                        <tr>
                            <th>Nombre del Torneo</th>
                            <th>Ciudad</th>
                            <th>Fecha Inicio</th>
                            <th>Fecha Fin</th>
                            <th>Creado Por</th>
                            <th class="text-end">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${torneos.isEmpty()}">
                            <td colspan="6" class="text-center p-4">No hay torneos creados.</td>
                        </tr>
                        <tr th:each="torneo : ${torneos}">
                            <td class="fw-bold">
                                <a th:href="@{/torneos/{id}(id=${torneo.id})}" class="text-black text-decoration-none stretched-link"
                                   th:text="${torneo.nombre}"></a>
                            </td>
                            <td th:text="${torneo.ciudad}"></td>
                            <td th:text="${torneo.fechaInicio}"></td>
                            <td th:text="${torneo.fechaFin}"></td>
                            <td th:text="${torneo.creadoPorNombre}"></td>
                            <td class="text-end">
                                <button type="button" class="btn btn-danger btn-sm"
                                        data-bs-toggle="modal" 
                                        th:data-bs-target="'#modalDeleteTorneo-' + ${torneo.id}">
                                    <i class="bi bi-trash-fill"></i>
                                </button>
                                
                                <div th:replace="~{fragments/modal-eliminar :: modal(
                                    modalId='modalDeleteTorneo-' + ${torneo.id},
                                    modalTitle='Confirmar Eliminación',
                                    modalBody='¿Seguro que deseas eliminar <strong>' + ${torneo.nombre} + '</strong>?',
                                    modalConfirmUrl=@{/torneos/eliminar/{id}(id=${torneo.id})}
                                )}"></div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <th:block th:replace="~{fragments/header :: scripts}"></th:block>
</body>
</html>
